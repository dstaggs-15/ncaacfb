<main class="login-page">
  <section class="login-header">
    <h1>CFB Dynasty</h1>
    <p>League Hub</p>
  </section>

  <section class="login-card">
    <input
      id="email"
      type="email"
      placeholder="Email"
      autocomplete="email"
    />

    <input
      id="password"
      type="password"
      placeholder="Password"
      autocomplete="current-password"
    />

    <button id="login-btn" class="primary-btn" type="button">
      Log In
    </button>

    <button id="signup-btn" class="secondary-btn" type="button">
      Sign Up
    </button>

    <p id="message" class="login-message"></p>
  </section>
</main>
