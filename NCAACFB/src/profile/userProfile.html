<section class="user-profile-page">
  <main class="user-profile-card">
    <nav class="dynasty-nav">
      <a href="/dynasty/" class="season-history-back-link">← Dynasty</a>
    </nav>

    <p class="profile-eyebrow">Profile Setup</p>

    <h1>User Profile</h1>

    <p class="profile-description">
      Set the display name that will appear throughout the dynasty hub.
    </p>

    <form id="user-profile-form" class="user-profile-form">
      <label for="display-name">Display Name</label>

      <input
        id="display-name"
        type="text"
        placeholder="Example: Coach Cozmic"
        maxlength="40"
        autocomplete="nickname"
      />

      <p id="profile-message" class="profile-message"></p>

      <button type="submit" class="primary-button">
        Save Display Name
      </button>
    </form>
  </main>
</section>
