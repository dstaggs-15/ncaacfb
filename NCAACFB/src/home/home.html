<div class="home-page">
  <video class="home-bg-video" autoplay muted loop playsinline>
    <source src="../assets/football.mp4" type="video/mp4" />
  </video>

  <div class="home-bg-fog"><div>

  <main class="home-card">
    <header class="home-header">
      <p class="home-kicker">League Hub</p>
      <h1 class="home-title">CFB Dynasty</h1>
    </header>

    <div class="home-actions">
      <button id="dynasty-btn" class="home-btn home-btn-primary">
        <span class="home-btn-title">Dynasty Tracker</span>
        <span class="home-btn-text">Manage seasons and teams!</span>
      </button>

      <button id="blogger-btn" class="home-btn home-btn-secondary">
        <span class="home-btn-title">Blog Generator</span>
        <span class="home-btn-text">Create league stories!</span>
      </button>

      <button id="add-btn" class="home-btn home-btn-add">
        <span class="home-btn-title">+ Add Stats</span>
        <span class="home-btn-text">Got New Data?</span>
      </button>
    </div>

    <button id="logout-btn" class="home-logout">Log Out</button>
  </main>
</div>
